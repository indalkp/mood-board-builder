<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mood Board Builder</title>
<style>
  /* Indal KP brand baseline */
  :root {
    --kpz-orange: #F26B21;
    --warm-gold:  #FFB347;
    --deep-night: #1A1A2E;
    --soft-canvas:#F7F5F2;
    --ink:        #1A1A1A;
    --mid-grey:   #6B6B6B;
    --light-grey: #C4C4C4;
    --white:      #FFFFFF;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--white); color: var(--ink);
  }
  #app { padding: 16px; min-height: 100vh; }
  .loading { padding: 48px; text-align: center; color: var(--mid-grey); }

  /* App UI styles (kept inline so the embed has zero external CSS deps) */
  .hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .hdr h1 { font-family:'Syne',Impact,sans-serif; font-weight:800; font-size:32px; color:var(--ink); margin:0; }
  .btn-primary { background:var(--kpz-orange); color:#fff; border:none; padding:12px 20px; border-radius:6px; font-weight:600; cursor:pointer; font-family:inherit; font-size:14px; }
  .btn-primary:hover { background:var(--warm-gold); color:var(--ink); }
  .board-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .board-card { background:var(--soft-canvas); border:1px solid var(--light-grey); padding:24px; border-radius:8px; cursor:pointer; transition:border-color .2s; }
  .board-card:hover { border-color:var(--kpz-orange); }
  .card-name { font-weight:600; font-size:16px; color:var(--ink); }
  .empty { padding:48px; text-align:center; color:var(--mid-grey); }
  .drop-zone { padding:24px; border:2px dashed var(--light-grey); border-radius:8px; text-align:center; color:var(--mid-grey); cursor:pointer; transition:all .2s; margin-bottom:24px; }
  .drop-zone:hover, .drop-zone.over { border-color:var(--kpz-orange); color:var(--kpz-orange); background:rgba(242,107,33,.05); }
  .image-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
  .image-cell img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:6px; display:block; }
  .share-bar { display:flex; gap:12px; align-items:center; margin-top:16px; padding:12px; background:var(--soft-canvas); border-radius:6px; }
  .share-bar input { flex:1; padding:8px; border:1px solid var(--light-grey); border-radius:4px; font-family:'DM Mono',monospace; font-size:13px; }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading mood board builder...</div></div>

<script type="module">
  // VERSION constant — bump on every release. Same pattern as KPZ Draw.
  const VERSION = "v0.1.0";
  const baseUrl = `https://cdn.jsdelivr.net/gh/indalkp/mood-board-builder@${VERSION}`;

  try {
    const { boot } = await import(`${baseUrl}/src/main.js`);
    boot();
  } catch (err) {
    document.querySelector("#app").innerHTML =
      `<div class="loading">Failed to load (${err.message}). Try a hard refresh.</div>`;
  }
</script>
</body>
</html>
